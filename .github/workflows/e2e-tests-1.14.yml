name: End to End Tests Flink 1.14

on:
  push:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

env:
  JDK_VERSION: 8
  MAVEN_OPTS: -server -Xmx4096m

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v2

      - name: Cache Maven repository
        id: cache-maven
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up JDK ${{ env.JDK_VERSION }}
        if: steps.cache-maven.outputs.exit-code == 0
        uses: actions/setup-java@v2
        with:
          java-version: ${{ env.JDK_VERSION }}
          distribution: 'adopt'

      - name: Build Flink 1.14
        run: mvn -T 1C -B -e clean install -DskipTests -Pflink-1.14

      - name: Test Flink 1.14
        timeout-minutes: 60
        run: |
          # run tests with random timezone to find out timezone related bugs
          . .github/workflows/utils.sh
          jvm_timezone=$(random_timezone)
          echo "JVM timezone is set to $jvm_timezone"
          mvn -T 1C -B -e test -pl paimon-e2e-tests -Duser.timezone=$jvm_timezone -Pflink-1.14
